version: '3.8'

services:
  trendradar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendradar
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "${PORT:-8080}:8080"
    networks:
      - trendradar_net
    depends_on:
      redis:
        condition: service_healthy

  # Optional: Redis for caching trend data
  redis:
    image: redis:7-alpine
    container_name: trendradar_redis
    restart: unless-stopped
    # not exposing redis port externally for security
    volumes:
      - redis_data:/data
    networks:
      - trendradar_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  trendradar_net:
    driver: bridge
